<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ASCII Studio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;700&family=Inter:wght@300;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --neon-primary: #55ff55;
            --void-bg: #050505;
            --border-dim: #1a1a1a;
        }

        body {
            background-color: var(--void-bg);
            color: #e0e0e0;
            font-family: 'Inter', sans-serif;
            overflow: hidden;
            transition: all 0.5s ease;
        }

        .mono { font-family: 'JetBrains Mono', monospace; }

        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: #000; }
        ::-webkit-scrollbar-thumb { background: #333; }
        ::-webkit-scrollbar-thumb:hover { background: var(--neon-primary); }

        #ascii-container {
            line-height: 0.8; 
            font-size: 8px; 
            white-space: pre;
            cursor: crosshair;
            transition: color 0.3s ease;
            display: block;
            margin: auto;
            text-align: center;
        }

        .ethereal-border {
            border: 1px solid var(--border-dim);
            transition: border-color 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .ethereal-border:hover {
            border-color: #444;
        }

        .control-panel {
            background: #080808;
            border-left: 1px solid var(--border-dim);
        }

        .btn-action {
            border: 1px solid var(--border-dim);
            background: transparent;
            transition: all 0.2s;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            font-size: 0.7rem;
            color: #888;
        }

        .btn-action:hover {
            border-color: var(--neon-primary);
            color: var(--neon-primary);
        }

        .btn-active {
            border-color: var(--neon-primary);
            color: var(--neon-primary);
            background: rgba(255, 255, 255, 0.05);
        }

        #video-preview, #canvas-hidden {
            display: none;
            position: absolute;
            pointer-events: none;
            opacity: 0;
        }

        .scanline {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(to bottom, rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%);
            background-size: 100% 4px;
            z-index: 50;
            pointer-events: none;
            opacity: 0.4;
        }

        .vibe-cyberpunk { --neon-primary: #00ffcc; }
        .vibe-goth { --neon-primary: #ff0044; }
        .vibe-phantom { --neon-primary: #ffffff; }
        .vibe-bios { --neon-primary: #55ff55; }

        input[type=range] {
            height: 2px;
            -webkit-appearance: none;
            background: #1a1a1a;
            outline: none;
        }
        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 12px;
            height: 12px;
            background: var(--neon-primary);
            cursor: pointer;
        }
    </style>
</head>
<body class="vibe-bios">
    <div class="scanline"></div>

    <div class="flex h-screen overflow-hidden">
        <main class="flex-1 relative flex flex-col p-4 md:p-8">
            <header class="flex justify-between items-start mb-6">
                <div class="mono">
                    <h1 class="text-xs font-bold tracking-[0.3em] opacity-50 mb-1">TERMINAL // ASCII_GEN</h1>
                    <div id="status-line" class="text-[10px] uppercase text-[var(--neon-primary)]">System: Booting...</div>
                </div>
                <div class="flex space-x-2">
                    <button id="download-btn" class="btn-action px-4 py-2">Capture</button>
                    <button id="copy-btn" class="btn-action px-4 py-2">Copy</button>
                </div>
            </header>

            <div class="flex-1 flex items-center justify-center overflow-auto ethereal-border relative bg-black">
                <pre id="ascii-container" class="mono leading-[0.8] tracking-tight text-[var(--neon-primary)]">
                    <div class="p-10 opacity-20 text-center uppercase tracking-widest text-xs">
                        [ Waiting for Input ]
                    </div>
                </pre>
            </div>

            <footer class="mt-4 flex justify-between items-center mono text-[9px] opacity-40 uppercase tracking-widest">
                <div>Src: <span id="source-type">Idle</span></div>
                <div id="coords">X: 0000 Y: 0000</div>
                <div>Kern: 1.0.7_Stable</div>
            </footer>
        </main>
        <aside class="w-80 control-panel p-6 flex flex-col space-y-8 overflow-y-auto relative z-10">
            <section>
                <h3 class="mono text-[10px] mb-4 opacity-30 tracking-tighter">DATA_INGESTION</h3>
                <div class="grid grid-cols-2 gap-2">
                    <button id="webcam-toggle" class="btn-action py-3">Webcam_Live</button>
                    <label class="btn-action py-3 text-center cursor-pointer block">
                        Import_File
                        <input type="file" id="file-upload" class="hidden" accept="image/*,video/*">
                    </label>
                </div>
            </section>

            <section>
                <h3 class="mono text-[10px] mb-4 opacity-30 tracking-tighter">ASCII_PRESET</h3>
                <div class="grid grid-cols-2 gap-2">
                    <button class="style-btn btn-action py-2 btn-active" data-set="bios">Bios_Retro</button>
                    <button class="style-btn btn-action py-2" data-set="neon">FLuxx_wave</button>
                    <button class="style-btn btn-action py-2" data-set="matrix">Virtual_Rain</button>
                    <button class="style-btn btn-action py-2" data-set="film">Film_Grain</button>
                    <button class="style-btn btn-action py-2" data-set="blocks">High_Density</button>
                    <button class="style-btn btn-action py-2" data-set="binary">Binary_Flow</button>
                    <button class="style-btn btn-action py-2" data-set="minimal">Micro_Dots</button>
                </div>
            </section>

            <section>
                <h3 class="mono text-[10px] mb-4 opacity-30 tracking-tighter">COLORS_VIBE</h3>
                <div class="grid grid-cols-2 gap-2">
                    <button class="vibe-btn btn-action py-2" data-vibe="bios">Matrix</button>
                    <button class="vibe-btn btn-action py-2" data-vibe="cyberpunk">Cyan</button>
                    <button class="vibe-btn btn-action py-2" data-vibe="goth">Blood_Moon</button>
                    <button class="vibe-btn btn-action py-2" data-vibe="phantom">B&W</button>
                </div>
            </section>

            <section class="space-y-6">
                <div>
                    <div class="flex justify-between mono text-[10px] mb-2 opacity-30">
                        <span>PIXEL_DENSITY</span>
                        <span id="res-val">120</span>
                    </div>
                    <input type="range" id="res-slider" min="40" max="250" value="120" class="w-full">
                </div>
                <div>
                    <div class="flex justify-between mono text-[10px] mb-2 opacity-30">
                        <span>SIGNAL_GAIN</span>
                        <span id="contrast-val">1.5</span>
                    </div>
                    <input type="range" id="contrast-slider" min="0.5" max="5.0" step="0.1" value="1.5" class="w-full">
                </div>
            </section>

            <section class="pt-6 border-t border-zinc-900 mono text-[9px] space-y-2 opacity-20">
                <p>AUTH: NAKZ_CORE</p>
                <p>ENCR: XX_XX</p>
            </section>
        </aside>
    </div>

    <video id="video-preview" autoplay playsinline muted></video>
    <canvas id="canvas-hidden"></canvas>
</body>
</html>
